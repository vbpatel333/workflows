name: Daily Rakuten Check

on:
  schedule:
    # This is "Cron" timing. 13:00 UTC is roughly 8:00 AM or 9:00 AM EST.
    - cron: '0 13 * * *'
  workflow_dispatch: # This allows you to run it manually to test

jobs:
  check-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
      env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python rakuten.py
