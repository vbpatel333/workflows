name: Daily Rakuten Checks

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-all-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This allows the bot to save your history file
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Priority Check (Pair of Thieves)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_PERSONAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rakuten.py

      - name: Run Global Discovery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_PERSONAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python discovery.py

      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add whale_history.json || echo "No history file yet"
          git commit -m "Update whale hunting history [skip ci]" || echo "No changes to history"
          git push
